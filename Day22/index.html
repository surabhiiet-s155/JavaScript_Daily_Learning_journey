<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 22 - Tabs UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📑 Tabs UI</h1>

        <div class="tabs">
            <button onclick="showTab('home')">Home</button>
            <button onclick="showTab('about')">About</button>
            <button onclick="showTab('contact')">Contact</button>
        </div>

        <div id="home" class="content">Welcome to Home Page</div>
        <div id="about" class="content">This is About Section</div>
        <div id="contact" class="content">Contact us at example@mail.com</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
